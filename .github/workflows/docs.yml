name: Docs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy documentation site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: site
        env:
          BASE_PATH: ${{ secrets.BASE_PATH || '/' }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://specrow.com/' }}
        run: pnpm build

      - name: Install deploy client
        if: github.event_name != 'pull_request'
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to Beget
        if: github.event_name != 'pull_request'
        env:
          BEGET_DEPLOY_HOST: ${{ secrets.BEGET_DEPLOY_HOST }}
          BEGET_DEPLOY_PORT: ${{ secrets.BEGET_DEPLOY_PORT }}
          BEGET_DEPLOY_USER: ${{ secrets.BEGET_DEPLOY_USER }}
          BEGET_DEPLOY_PASSWORD: ${{ secrets.BEGET_DEPLOY_PASSWORD }}
          BEGET_DEPLOY_PATH: ${{ secrets.BEGET_DEPLOY_PATH }}
        run: |
          test -n "$BEGET_DEPLOY_HOST"
          test -n "$BEGET_DEPLOY_PORT"
          test -n "$BEGET_DEPLOY_USER"
          test -n "$BEGET_DEPLOY_PASSWORD"
          test -n "$BEGET_DEPLOY_PATH"

          lftp -u "$BEGET_DEPLOY_USER","$BEGET_DEPLOY_PASSWORD" "sftp://$BEGET_DEPLOY_HOST:$BEGET_DEPLOY_PORT" \
            -e "set sftp:auto-confirm yes; set net:timeout 30; set net:max-retries 2; mirror --reverse --delete --verbose --parallel=2 site/dist \"$BEGET_DEPLOY_PATH\"; bye"
